# ============================================================
#  FoliaDupe  |  messages.yml
#
#  All messages use the Adventure MiniMessage format.
#
#  Set any message to "none" (or leave it blank) to silence it.
#  Available placeholders are listed above each message.
# ============================================================

# Prepended to every message below. Include a trailing space.
prefix: "<gradient:#3A8BFF:#1E5FD8><bold>DUPE</bold></gradient> <dark_gray>»</dark_gray> "

# Placeholders: <item> (item name), <amount> (times duplicated)
dupe-success: "<gray>You duplicated <white><item></white> <green><amount></green> <gray>time(s)!"

# Sent when trying to duplicate air.
air: "<red>You can't duplicate air!"

# Sent when the held item is blacklisted (material, NBT, lifesteal or tag).
blacklisted: "<red>This item is blacklisted and cannot be duplicated!"

# Sent when the held container (shulker box or bundle) holds a blacklisted item.
container-blacklisted: "<red>This container holds a blacklisted item and cannot be duplicated!"

# Sent by /blacklist when tagging / untagging the held item.
item-blacklisted: "<gray>This item is now <red>blacklisted<gray>!"
item-unblacklisted: "<gray>This item is no longer <red>blacklisted<gray>!"

# Validation / permission feedback.
invalid-amount: "<red>Please provide a valid, positive amount."
no-permission: "<red>You don't have permission to do that."
player-only: "<red>Only players can use this command."

# Admin feedback. Placeholders: <materials>, <keywords>
reload-success: "<green>Configuration reloaded <gray>(<white><materials></white> materials, <white><keywords></white> keywords)."
reload-failed: "<red>Reload failed — check the console for details."

# Placeholder: <version>
version: "<gray>Running <white>FoliaDupe v<version></white>."

# ============================================================
#  /dupebans GUI.
#
#  Only items obtainable in vanilla survival are listed; purely
#  creative-only entries (command blocks, spawn eggs, barriers,
#  the debug stick, ...) are hidden from the menu.
# ============================================================
dupebans:
  # Inventory title. Placeholders: <page>, <pages>
  title: "<gradient:#3A8BFF:#1E5FD8><bold>Blacklisted Items</bold></gradient> <dark_gray>(<white><page></white>/<white><pages></white>)"
  # Sent when nothing can be shown in the GUI.
  empty: "<red>There are no blacklisted items to display."
  # Navigation buttons. Placeholders: <page> (target page), <pages>
  previous-page: "<yellow>« Previous Page <dark_gray>(<white><page></white>/<white><pages></white>)"
  next-page: "<yellow>Next Page » <dark_gray>(<white><page></white>/<white><pages></white>)"
  # Summary button in the centre of the bottom row.
  info-name: "<white><bold>Blacklisted Items"
  # Placeholders: <shown>, <hidden>, <keywords>
  info-lore:
    - "<gray>Listed items: <white><shown>"
    - "<gray>Hidden (creative-only): <white><hidden>"
    - "<gray>Blocked keywords: <white><keywords>"
    - ""
    - "<dark_gray>These items cannot be duplicated."
  # Lore shown under every listed item. Placeholder: <material>
  entry-lore:
    - "<dark_gray><material>"
    - "<red>Cannot be duplicated."
  # Lore used for creative-only items once "show hidden" is enabled.
  entry-lore-hidden:
    - "<dark_gray><material>"
    - "<red>Cannot be duplicated."
    - "<dark_purple>Creative-only item."
  # Toggle button (bottom row) that reveals the creative-only entries.
  # The toggle is per-player and resets when the menu is closed.
  toggle-name: "<white><bold>Creative-Only Items"
  # Placeholders: <state>, <hidden>
  toggle-lore:
    - "<gray>Currently: <state>"
    - "<gray>Creative-only entries: <white><hidden>"
    - ""
    - "<yellow>Click to toggle."
  state-shown: "<green>Shown"
  state-hidden: "<red>Hidden"
